<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء كود برمجي بالذكاء الاصطناعي بدقة فائقة</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #34d399;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* الهيدر / رأس الصفحة */
        .header {
            background-color: var(--card-bg);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #334155;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--accent-color);
            font-weight: 800;
        }

        .header p {
            margin: 8px 0 0 0;
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* كارت التحكم والطلب */
        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .section-title {
            font-size: 1.3rem;
            color: var(--text-main);
            margin-top: 0;
            margin-bottom: 20px;
            border-right: 4px solid var(--accent-color);
            padding-right: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        select, textarea, input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-dark);
            border: 1px solid #475569;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus, textarea:focus {
            border-color: var(--accent-color);
        }

        textarea {
            resize: vertical;
            height: 120px;
        }

        /* الأزرار */
        .btn-generate {
            width: 100%;
            background-color: var(--accent-color);
            color: var(--bg-dark);
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn-generate:hover {
            background-color: var(--accent-hover);
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        /* شاشة عرض الكود الناتج */
        .output-box {
            background-color: #0b0f19;
            border-radius: 12px;
            border: 1px solid #334155;
            padding: 20px;
            position: relative;
            height: 100%;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 10px;
        }

        .status-badge {
            font-size: 0.85rem;
            background-color: #1e293b;
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--accent-color);
        }

        .btn-copy {
            background-color: #1e293b;
            color: var(--text-main);
            border: 1px solid #475569;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-copy:hover {
            background-color: #334155;
        }

        pre {
            margin: 0;
            flex-grow: 1;
            overflow-auto: auto;
            font-family: 'Courier New', Courier, monospace;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            direction: ltr; /* لجعل الكود البرمجي يظهر من اليسار لليمين بشكل صحيح */
            text-align: left;
        }

        /* فوتر */
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid #1e293b;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <header class="header">
        <h1>إنشاء كود برمجي بالذكاء الاصطناعي بدقة فائقة</h1>
        <p>المنصة الذكية الأولى لتوليد أكواد المواقع، البوتات، والتطبيقات حسب طلبكِ</p>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="container">
        
        <!-- لوحة التحكم والطلب -->
        <section class="card">
            <h2 class="section-title">إعدادات الطلب الذكي</h2>
            
            <!-- نوع البرمجية -->
            <div class="form-group">
                <label for="codeType">نوع المشروع أو الكود المطلوب:</label>
                <select id="codeType">
                    <option value="website">موقع إلكتروني كامل (HTML/CSS/JS)</option>
                    <option value="bot">بوت تليجرام أو ديسكورد (Python / Node.js)</option>
                    <option value="script">سكربت أتمتة وأدوات ذكية</option>
                    <option value="app">تطبيق موبايل (Flutter / React Native)</option>
                    <option value="database">قواعد بيانات واستعلامات (SQL)</option>
                </select>
            </div>

            <!-- لغة البرمجة المفضلة -->
            <div class="form-group">
                <label for="language">لغة البرمجة المفضلة (اختياري):</label>
                <select id="language">
                    <option value="auto">تحديد تلقائي حسب نوع المشروع</option>
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript / Node.js</option>
                    <option value="html-css">HTML & CSS</option>
                    <option value="php">PHP</option>
                    <option value="cpp">C++</option>
                </select>
            </div>

            <!-- وصف الطلب -->
            <div class="form-group">
                <label for="prompt">اكتبي وصفاً دقيقاً لما تريدين من الذكاء الاصطناعي بناءه:</label>
                <textarea id="prompt" placeholder="مثال: أريد كود لبوت تليجرام يقوم بالرد التلقائي على الزبائن وحفظ البيانات..."></textarea>
            </div>

            <!-- زر التوليد -->
            <button class="btn-generate" onclick="generateCode()">⚡ توليد الكود بدقة فائقة</button>
        </section>

        <!-- شاشة عرض الكود الناتج -->
        <section class="output-box">
            <div class="output-header">
                <span class="status-badge" id="statusText">بانتظار طلبكِ...</span>
                <button class="btn-copy" onclick="copyCode()">نسخ الكود 📋</button>
            </div>
            <!-- مكان ظهور الأكواد -->
            <pre id="codeOutput">// الكود البرمجي المولد سيظهر هنا بالكامل وبشكل منسق...</pre>
        </section>

    </main>

    <!-- الفوتر -->
    <footer class="footer">
        <p>جميع الحقوق محفوظة © منصة التوليد الفائق - 2026</p>
    </footer>

    <script>
        function generateCode() {
            var promptValue = document.getElementById('prompt').value;
            var codeType = document.getElementById('codeType').value;
            var output = document.getElementById('codeOutput');
            var status = document.getElementById('statusText');

            if(promptValue.trim() === "") {
                alert("الرجاء كتابة وصف الكود المطلوب أولاً!");
                return;
            }

            status.innerText = "⏳ جاري المعالجة والتوليد الفائق...";
            output.innerText = "// جاري التفكير وبناء البنية البرمجية المستقرة...";

            // محاكاة سريعة لتوليد الكود بناءً على الخيار المحدد
            setTimeout(function() {
                status.innerText = "✅ تم التوليد بنجاح بدقة 100%";
                
                if(codeType === "website") {
                    output.innerText = "<!DOCTYPE html>\n<html>\n<head>\n  <title>الموقع المطلوب</title>\n</head>\n<body>\n  <h1>تم إنشاء واجهة الموقع بنجاح حسب طلبكِ!</h1>\n</body>\n</html>";
                } else if(codeType === "bot") {
                    output.innerText = "import telebot\n\nAPI_TOKEN = 'YOUR_BOT_TOKEN'\nbot = telebot.TeleBot(API_TOKEN)\n\n@bot.message_handler(commands=['start'])\ndef send_welcome(message):\n    bot.reply_to(message, 'أهلاً بك في بوت الخدمة التلقائية!')\n\nbot.polling()";
                } else {
                    output.innerText = "print('تم إنشاء السكربت المخصص بنجاح وبأعلى كفاءة لضمان استقرار العمل.')";
                }
            }, 1500);
        }

        function copyCode() {
            var codeText = document.getElementById('codeOutput').innerText;
            navigator.clipboard.writeText(codeText);
            alert("تم نسخ الكود البرمجي إلى الحافظة بنجاح!");
        }
    </script>
</body>
</html>
